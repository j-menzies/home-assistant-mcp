services:
  ha-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: home-assistant-mcp:latest
    container_name: ha-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      MCP_PORT: "3000"
      MCP_HOST: "0.0.0.0"
    extra_hosts:
      # Allows the container to reach HA on the host
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
